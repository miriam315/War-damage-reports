<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מערכת ניהול דיווחי נזקים - משודרגת</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <header>
        <div>
            <h1>מערכת ניהול דיווחי נזקים</h1>
            <p class="header-subtitle">ניהול פניות ומפגעים עירוניים בזמן אמת</p>
        </div>
        
        <div class="tabs-nav">
            <button class="tab-btn active" onclick="switchTab('create-tab')">דיווח חדש</button>
            <button class="tab-btn" onclick="switchTab('manage-tab')">ניהול פניות</button>
        </div>
    </header>

    <div id="create-tab" class="tab-content active">
        <div class="panel create-panel">
            <h2>יצירת דיווח נזק חדש</h2>
            <form id="createForm">
                <div class="form-group">
                    <label for="reporterName">שם המדווח:</label>
                    <input type="text" id="reporterName" required placeholder="ישראל ישראלי">
                </div>
                <div class="form-group">
                    <label for="address">כתובת הנזק:</label>
                    <input type="text" id="address" required placeholder="רחוב הרצל 10, תל אביב">
                </div>
                <div class="form-group">
                    <label for="damageType">סוג הנזק:</label>
                    <input type="text" id="damageType" required placeholder="לדוגמה: פיצוץ צינור, בור בכביש">
                </div>
                <div class="form-group">
                    <label for="description">תיאור מלא:</label>
                    <textarea id="description" rows="4" required placeholder="פרט ככל הניתן על מהות הנזק..."></textarea>
                </div>
                <button type="submit" class="submit-btn">שלח דיווח למערכת</button>
            </form>
        </div>
    </div>

    <div id="manage-tab" class="tab-content">
        <div class="dashboard">
            <div class="stat-card">
                <h3>סה"כ דיווחים</h3>
                <div class="number" id="count-all">0</div>
            </div>
            <div class="stat-card pending-card">
                <h3>ממתין לאימות</h3>
                <div class="number text-pending" id="count-pending">0</div>
            </div>
            <div class="stat-card progress-card">
                <h3>בטיפול</h3>
                <div class="number text-progress" id="count-progress">0</div>
            </div>
            <div class="stat-card done-card">
                <h3>טופל</h3>
                <div class="number text-done" id="count-done">0</div>
            </div>
        </div>

        <div class="management-layout">
            <div class="panel">
                <h2>רשימת דיווחים במערכת</h2>
                <div class="filter-bar">
                    <input type="text" id="searchInput" class="search-input" placeholder="חיפוש חופשי (שם, כתובת...)" oninput="filterReports()">
                    <select id="filterStatus" class="filter-select" onchange="filterReports()">
                        <option value="ALL">כל הסטטוסים</option>
                        <option value="ממתין לאימות">ממתין לאימות</option>
                        <option value="בטיפול">בטיפול</option>
                        <option value="טופל">טופל</option>
                    </select>
                </div>
                <div class="report-list-container" id="reportsList">
                    </div>
            </div>

            <div class="panel" id="detailsPanel">
                <h2>
                    פרטי דיווח מלאים
                    <button onclick="closeDetails()" class="close-btn">סגור</button>
                </h2>
                <div id="reportDetails"></div>
                
                <div class="form-group status-update-section">
                    <label class="status-label">עדכון סטטוס טיפול:</label>
                    <select id="statusSelect"></select>
                    <button onclick="updateStatus()" class="submit-btn update-btn">עדכן סטטוס פנייה</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
